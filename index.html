<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AutoStock – 消耗品＆食品管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans JP',sans-serif;
  background:#0a0a1a;
  color:#e0e0e0;
  min-height:100vh;
  transition: background 0.3s, color 0.3s;
}
/* ===== Pet Mode Theme (明るいグレー) ===== */
body.pet-mode { background:#d8d8e0; color:#333350; }
body.pet-mode .header { background:linear-gradient(135deg,#8888a0,#9999b0); }
body.pet-mode .summary-bar { background:rgba(120,120,150,0.15); }
body.pet-mode .summary-item { background:rgba(120,120,150,0.15); color:#555570; }
body.pet-mode .card { background:#e8e8f0; border-left-color:#7070a0; }
body.pet-mode .card .item-name { color:#333350; }
body.pet-mode .card .meta { color:#666680; }
body.pet-mode .section-title { color:#555570; }
body.pet-mode .btn { background:#7070a0; }
body.pet-mode .btn:hover { background:#606090; }
body.pet-mode .modal-content { background:#e0e0e8; color:#333350; }
body.pet-mode .modal-content input,
body.pet-mode .modal-content select { background:#f0f0f5; color:#333350; border-color:#aaaacc; }
body.pet-mode .stock-badge { background:rgba(100,100,140,0.15); color:#555570; }

/* ===== Food Mode Theme (温かいグリーン系) ===== */
body.food-mode { background:#0a1a10; }
body.food-mode .header { background:linear-gradient(135deg,#14401f,#1b6934); }
body.food-mode .card { background:#10231a; border-left-color:#2ed573; }
body.food-mode .btn { background:#2e9d57; color:#fff; }
body.food-mode .btn:hover { background:#26884a; }
body.food-mode .modal-content { background:#10231a; }

/* ===== Care Mode Theme (身だしなみ: 温かいアンバー系) ===== */
body.care-mode { background:#1a1206; }
body.care-mode .header { background:linear-gradient(135deg,#4a3410,#7a5a1b); }
body.care-mode .card { background:#231a0d; border-left-color:#e0a020; }
body.care-mode .card.ok { border-left-color:#e0a020; }
body.care-mode .btn { background:#c88a1e; color:#fff; }
body.care-mode .btn:hover { background:#b07818; }
body.care-mode .btn.replace { background:#e0a020; color:#000; }
body.care-mode .modal-content { background:#231a0d; }

.header {
  background:linear-gradient(135deg,#1a1a3e,#2d1b69);
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header h1 { font-size:20px; font-weight:700; }
.header-btns { display:flex; gap:8px; }
.header-btn {
  background:rgba(255,255,255,0.15);
  border:none; border-radius:50%;
  width:36px; height:36px;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#fff; transition:background 0.2s;
}
.header-btn:hover { background:rgba(255,255,255,0.25); }
.header-btn.active { background:rgba(255,255,255,0.35); box-shadow:0 0 8px rgba(255,255,255,0.3); }
body.pet-mode .header-btn { color:#fff; }

.container { max-width:480px; margin:0 auto; padding:12px; }

/* Summary bar */
.summary-bar {
  display:flex; gap:8px; margin-bottom:16px;
  background:rgba(255,255,255,0.05);
  border-radius:12px; padding:10px;
}
.summary-item {
  flex:1; text-align:center; border-radius:8px;
  padding:8px 4px; background:rgba(255,255,255,0.05);
  font-size:12px; color:#888;
}
.summary-item .num { font-size:22px; font-weight:700; display:block; }
.summary-item.urgent .num { color:#ff4757; }
.summary-item.soon .num { color:#ffa502; }
.summary-item.ok .num { color:#2ed573; }

/* Sections */
.section { margin-bottom:16px; }
.section-title {
  font-size:13px; font-weight:500; color:#888;
  margin-bottom:8px; padding-left:4px;
}

/* Cards */
.card {
  background:#151530;
  border-radius:12px;
  padding:14px;
  margin-bottom:8px;
  border-left:4px solid #2ed573;
  position:relative;
  transition: opacity 0.3s, background 0.3s;
}
.card.urgent { border-left-color:#ff4757; }
.card.soon { border-left-color:#ffa502; }
.card.ok { border-left-color:#2ed573; }
.card.stock-only { border-left-color:#5352ed; }
.card.out-of-stock { border-left-color:#ff4757; background:#1a0a0a; }
body.pet-mode .card.out-of-stock { background:#f0e0e0; }
.card.paused { opacity:0.5; border-left-color:#666; }

.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.item-icon { font-size:24px; margin-right:8px; }
.item-name { font-size:15px; font-weight:500; flex:1; }
.meta { font-size:11px; color:#888; }

/* Badges */
.stock-badge {
  display:inline-block; font-size:11px; padding:2px 8px;
  border-radius:10px; margin-left:8px; background:rgba(255,255,255,0.08);
}
.stock-badge.warning { color:#ffa502; background:rgba(255,165,2,0.15); }
.stock-badge.danger { color:#ff4757; background:rgba(255,71,87,0.15); }
.stock-badge.ingredient { color:#2ed573; background:rgba(46,213,115,0.15); }

/* Progress bar */
.progress-wrap { height:6px; background:rgba(255,255,255,0.1); border-radius:3px; margin:8px 0; overflow:hidden; }
.progress-bar { height:100%; border-radius:3px; transition:width 0.5s; }
.progress-bar.ok { background:#2ed573; }
.progress-bar.soon { background:#ffa502; }
.progress-bar.urgent { background:#ff4757; }

/* Status badge */
.status-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500; }
.status-badge.urgent { background:rgba(255,71,87,0.2); color:#ff4757; }
.status-badge.soon { background:rgba(255,165,2,0.2); color:#ffa502; }
.status-badge.ok { background:rgba(46,213,115,0.2); color:#2ed573; }

/* Buttons */
.card-actions { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.btn {
  border:none; border-radius:8px; padding:7px 12px;
  font-size:12px; cursor:pointer; font-family:inherit;
  background:#5352ed; color:#fff; transition:background 0.2s;
}
.btn:hover { background:#4341d0; }
.btn.amazon { background:#ff9900; color:#000; }
.btn.amazon:hover { background:#e68a00; }
.btn.replace { background:#2ed573; color:#000; }
.btn.replace:hover { background:#26b85f; }
.btn.edit { background:rgba(255,255,255,0.1); color:#ccc; }
.btn.edit:hover { background:rgba(255,255,255,0.2); }
body.pet-mode .btn.edit { background:rgba(0,0,0,0.08); color:#555; }

.stock-large { font-size:28px; font-weight:700; text-align:center; padding:8px 0; }
.stock-large.warning { color:#ffa502; }
.stock-large.danger { color:#ff4757; }
.stock-large.ok { color:#2ed573; }

/* Modal */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.7); z-index:200;
  align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal-content {
  background:#1a1a3e; border-radius:16px; padding:24px;
  width:90%; max-width:400px; max-height:85vh; overflow-y:auto; color:#e0e0e0;
}
.modal-content h2 { font-size:18px; margin-bottom:16px; }
.modal-content label { display:block; font-size:13px; color:#aaa; margin:10px 0 4px; }
.modal-content input, .modal-content select {
  width:100%; padding:10px; border-radius:8px;
  border:1px solid #333; background:#0d0d20; color:#e0e0e0;
  font-size:14px; font-family:inherit;
}
.modal-content .checkbox-row { display:flex; align-items:center; gap:8px; margin:12px 0; font-size:14px; }
.modal-content .checkbox-row input[type=checkbox] { width:18px; height:18px; }
.modal-btns { display:flex; gap:8px; margin-top:20px; }
.modal-btns .btn { flex:1; padding:12px; font-size:14px; }
.btn.cancel { background:#555; }
.btn.cancel:hover { background:#666; }
.btn.danger { background:#ff4757; }
.btn.danger:hover { background:#e03e4d; }
.error-msg { color:#ff4757; font-size:12px; margin-top:4px; display:none; }
.food-only { display:none; }
.settings-group { margin-bottom:12px; }
.settings-group label { font-size:12px; color:#999; }
.loading { text-align:center; padding:40px; color:#888; font-size:14px; }
.app-error { text-align:center; padding:40px; color:#ff4757; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <h1 id="appTitle">📦 AutoStock</h1>
  <div class="header-btns">
    <button class="header-btn" onclick="toggleFoodMode()" title="食品モード" id="foodBtn">🍎</button>
    <button class="header-btn" onclick="togglePetMode()" title="ペットモード" id="petBtn">🐰</button>
    <button class="header-btn" onclick="toggleCareMode()" title="身だしなみ" id="careBtn">✂️</button>
    <button class="header-btn" onclick="toggleVehicleMode()" title="車両" id="vehicleBtn">🚗</button>
    <button class="header-btn" onclick="loadData()" title="更新">🔄</button>
    <button class="header-btn" onclick="openSettings()" title="設定">⚙️</button>
    <button class="header-btn" onclick="openAdd()" title="追加">➕</button>
  </div>
</div>

<div class="container">
  <div class="summary-bar" id="summaryBar">
    <div class="summary-item urgent"><span class="num" id="sumUrgent">0</span><span id="lblUrgent">要交換</span></div>
    <div class="summary-item soon"><span class="num" id="sumSoon">0</span><span id="lblSoon">まもなく</span></div>
    <div class="summary-item ok"><span class="num" id="sumOk">0</span>正常</div>
  </div>
  <div id="itemList"><div class="loading">⚙️ 設定からGitHub接続してください</div></div>
</div>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <h2 id="modalTitle">アイテム編集</h2>
    <input type="hidden" id="editId">
    <label>アイコン（絵文字）</label>
    <input type="text" id="editIcon" placeholder="💧">
    <label>名前</label>
    <input type="text" id="editName" placeholder="浄水器フィルター">

    <!-- 消耗品モード用フィールド -->
    <div class="item-only">
      <label>Amazon ASIN</label>
      <input type="text" id="editAsin" placeholder="B07ZDBXX47">
      <label>交換サイクル（日）※在庫のみ管理の場合は空欄</label>
      <input type="number" id="editCycle" placeholder="60">
      <label>最終交換日</label>
      <input type="date" id="editLastReplaced">
      <label>何日前に通知（空欄=既定7日 ／ 0=当日から）</label>
      <input type="number" id="editItemNotifyDays" placeholder="7" min="0">
    </div>

    <!-- 食品モード用フィールド -->
    <div class="food-only">
      <label>カテゴリ</label>
      <select id="editCategory" onchange="onCategoryChange()">
        <option value="生鮮">生鮮</option>
        <option value="冷凍">冷凍</option>
        <option value="常温">常温</option>
        <option value="調味料">調味料</option>
        <option value="飲料">飲料</option>
        <option value="菓子">菓子</option>
      </select>
      <label>賞味期間（買った日から）※一度決めれば以降は「🛒買った」で自動更新</label>
      <div style="display:flex;gap:8px;">
        <input type="number" id="editShelfLife" placeholder="7" min="0" style="flex:2;">
        <select id="editShelfUnit" style="flex:1;">
          <option value="1">日</option>
          <option value="7">週</option>
          <option value="30">ヶ月</option>
          <option value="365">年</option>
        </select>
      </div>
      <label>購入日（既定=今日）</label>
      <input type="date" id="editPurchase">
      <label>賞味期限を直接指定する場合（※賞味期間を空にした時だけ有効）</label>
      <input type="date" id="editExpiry">
      <label>何日前に通知（空欄=カテゴリ既定）</label>
      <input type="number" id="editNotifyDays" placeholder="3">
    </div>

    <label>在庫総数（任意）</label>
    <input type="number" id="editStockTotal" placeholder="3" min="0">
    <label>現在の残数（任意）</label>
    <input type="number" id="editStockCurrent" placeholder="2" min="0">
    <label>入数（1箱=N個）※パック品のみ。空欄/1=箱管理しない</label>
    <input type="number" id="editUnitsPerPack" placeholder="24" min="1">
    <label>メモ</label>
    <input type="text" id="editNote" placeholder="">
    <div class="checkbox-row">
      <input type="checkbox" id="editPaused">
      <span>⏸ 一時停止する</span>
    </div>
    <!-- 消耗品モード: ペット -->
    <div class="checkbox-row item-only">
      <input type="checkbox" id="editPet">
      <span>🐰 ペット関連のアイテム</span>
    </div>
    <!-- 消耗品モード: 身だしなみ -->
    <div class="checkbox-row item-only">
      <input type="checkbox" id="editCare">
      <span>✂️ 身だしなみ（セルフケア）</span>
    </div>
    <!-- 食品モード: 料理食材 -->
    <div class="checkbox-row food-only">
      <input type="checkbox" id="editIngredient">
      <span>🍳 料理に使う食材（使い切り/期限切れで買い足し連携）</span>
    </div>
    <div class="error-msg" id="editError"></div>
    <div class="modal-btns">
      <button class="btn cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn danger" id="deleteBtn" onclick="deleteItem()" style="display:none">🗑</button>
      <button class="btn" onclick="saveItem()">保存する</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <h2>⚙️ GitHub 設定</h2>
    <div class="settings-group">
      <label>GitHubユーザー名</label>
      <input type="text" id="setUser" placeholder="Junkiki22">
    </div>
    <div class="settings-group">
      <label>リポジトリ名</label>
      <input type="text" id="setRepo" placeholder="autostock">
    </div>
    <div class="settings-group">
      <label>Personal Access Token</label>
      <input type="password" id="setToken" placeholder="ghp_xxxxxxxxxx">
    </div>
    <div class="settings-group">
      <label>消耗品の通知タイミング（何日前）</label>
      <input type="number" id="setNotifyDays" placeholder="7" value="7">
    </div>
    <div class="modal-btns">
      <button class="btn cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn" onclick="saveSettings()">保存して読み込む</button>
    </div>
  </div>
</div>

<script>
// ===== State =====
let itemsData = [];   // 消耗品 items.json
let foodsData = [];   // 食品 foods.json
let _petMode = false;
let _foodMode = false;
let _careMode = false;
let _vehicleMode = false;  // 車両(kind:vehicle)モード
let _fileSha = null;      // items.json sha
let _foodSha = null;      // foods.json sha

const CATEGORY_DEFAULT_NOTIFY = { '生鮮':3, '冷凍':14, '常温':30, '調味料':14, '飲料':14, '菓子':7 };
// カテゴリ別「賞味期間」既定(日)。初回登録時の提案値。品目ごとに上書き可(記憶される)
const CATEGORY_DEFAULT_SHELF = { '生鮮':7, '冷凍':30, '常温':365, '調味料':365, '飲料':180, '菓子':90 };

// ===== 日付ヘルパー(賞味期間ベース) =====
// ローカル暦日(JST)の今日。toISOStringはUTCで早朝にずれるので getFullYear系で組む
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
// 'YYYY-MM-DD' に日数を足す。UTCで計算しTZずれ(±1日)を防ぐ(暦日演算)
function addDaysStr(dateStr, days) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  dt.setUTCDate(dt.getUTCDate() + Number(days));
  return dt.toISOString().slice(0,10);
}
// shelfLifeDays(絶対日数) → {value,unit} 見やすい単位に分解(年→ヶ月→週→日)
function daysToUnit(days) {
  if (days == null || days === '') return { value:'', unit:1 };
  const d = Number(days);
  if (d % 365 === 0) return { value:d/365, unit:365 };
  if (d % 30  === 0) return { value:d/30,  unit:30 };
  if (d % 7   === 0) return { value:d/7,   unit:7 };
  return { value:d, unit:1 };
}
// モーダルの賞味期間入力(値×単位) → shelfLifeDays。未入力は null
function readShelfDays() {
  const v = document.getElementById('editShelfLife').value.trim();
  if (!v) return null;
  const unit = parseInt(document.getElementById('editShelfUnit').value) || 1;
  return parseInt(v) * unit;
}
// カテゴリ変更時: 賞味期間が空なら既定を提案(年/ヶ月/日の見やすい単位で)
function onCategoryChange() {
  const el = document.getElementById('editShelfLife');
  if (el.value.trim()) return; // 既に入力済みなら触らない
  const cat = document.getElementById('editCategory').value;
  const def = CATEGORY_DEFAULT_SHELF[cat];
  if (def == null) return;
  const u = daysToUnit(def);
  el.value = u.value;
  document.getElementById('editShelfUnit').value = String(u.unit);
}

// ===== Settings =====
function getSettings() {
  try { return JSON.parse(localStorage.getItem('autostock_settings') || '{}'); }
  catch(e) { return {}; }
}
function openSettings() {
  const s = getSettings();
  document.getElementById('setUser').value = s.user || '';
  document.getElementById('setRepo').value = s.repo || '';
  document.getElementById('setToken').value = s.token || '';
  document.getElementById('setNotifyDays').value = s.notifyDays || 7;
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
function saveSettings() {
  const settings = {
    user: document.getElementById('setUser').value.trim(),
    repo: document.getElementById('setRepo').value.trim(),
    token: document.getElementById('setToken').value.trim(),
    notifyDays: parseInt(document.getElementById('setNotifyDays').value) || 7
  };
  localStorage.setItem('autostock_settings', JSON.stringify(settings));
  closeSettings();
  loadData();
}

// ===== Mode toggles =====
// UI（テーマ/タイトル/ラベル/ボタン/モーダル項目）を現在のモードに合わせて更新
function applyModeUI() {
  document.body.classList.toggle('food-mode', _foodMode);
  document.body.classList.toggle('pet-mode', _petMode);
  document.body.classList.toggle('care-mode', _careMode);
  document.body.classList.toggle('vehicle-mode', _vehicleMode);
  document.getElementById('foodBtn').classList.toggle('active', _foodMode);
  document.getElementById('petBtn').classList.toggle('active', _petMode);
  document.getElementById('careBtn').classList.toggle('active', _careMode);
  document.getElementById('vehicleBtn').classList.toggle('active', _vehicleMode);
  document.getElementById('appTitle').textContent =
    _foodMode ? '🥗 AutoStock 食品' : (_careMode ? '✂️ 身だしなみ' : (_vehicleMode ? '🚗 車両' : '📦 AutoStock'));
  document.getElementById('lblUrgent').textContent = _foodMode ? '要対応' : '要交換';
  document.getElementById('lblSoon').textContent = 'まもなく';
  document.querySelectorAll('.food-only').forEach(el => el.style.display = _foodMode ? (el.classList.contains('checkbox-row') ? 'flex' : 'block') : 'none');
  document.querySelectorAll('.item-only').forEach(el => el.style.display = _foodMode ? 'none' : '');
}

// 🐰 押下: 食品モード中なら食品を抜けて直接ペットモードへ。消耗品中なら通常⇔ペットをトグル
function togglePetMode() {
  const wasFood = _foodMode;
  if (_foodMode) {
    _foodMode = false;
    _petMode = true;      // 食品 → ペットへ直行
    _careMode = false;
    _vehicleMode = false;
  } else {
    _careMode = false;    // 身だしなみ中でも通常⇔ペットへ
    _vehicleMode = false;
    _petMode = !_petMode; // 通常 ⇔ ペット
  }
  applyModeUI();
  if (wasFood) loadData(); // 食品→消耗品はデータソースが変わるので再読込
  else render();           // 消耗品内の切替はデータ再利用で即描画
}

// 🍎 押下: 食品モードをトグル。入るときはペット/身だしなみ解除
function toggleFoodMode() {
  _foodMode = !_foodMode;
  if (_foodMode) { _petMode = false; _careMode = false; _vehicleMode = false; }
  applyModeUI();
  loadData(); // items.json ⇔ foods.json でデータソースが変わるので再読込
}

// ✂️ 押下: 身だしなみモードをトグル。食品からはデータ再読込、消耗品/ペットからは即描画
function toggleCareMode() {
  const wasFood = _foodMode;
  if (_careMode) {
    _careMode = false;      // 身だしなみ → 通常へ
  } else {
    _foodMode = false;
    _petMode = false;
    _vehicleMode = false;
    _careMode = true;
  }
  applyModeUI();
  if (wasFood) loadData();  // 食品→消耗品系はデータソースが変わるので再読込
  else render();            // 消耗品(items.json)内の切替は即描画
}

// ===== GitHub API =====
async function ghFetch(path, options = {}) {
  const s = getSettings();
  if (!s.user || !s.repo || !s.token) throw new Error('GitHub設定が未入力です');
  const url = `https://api.github.com/repos/${s.user}/${s.repo}/contents/${path}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': `token ${s.token}`,
      'Accept': 'application/vnd.github.v3+json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) throw new Error(`GitHub API Error ${res.status}`);
  return res.json();
}
function decodeBase64Utf8(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function encodeUtf8Base64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// ===== Load =====
async function loadData() {
  const list = document.getElementById('itemList');
  list.innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    if (_foodMode) {
      let data;
      try { data = await ghFetch('foods.json'); }
      catch(e) {
        // foods.json 未作成なら空で開始
        foodsData = []; _foodSha = null; render();
        list.innerHTML = '<div class="loading">🥗 食品未登録。➕ から追加してください</div>';
        return;
      }
      _foodSha = data.sha;
      foodsData = JSON.parse(decodeBase64Utf8(data.content.replace(/\n/g, '')));
    } else {
      const data = await ghFetch('items.json');
      _fileSha = data.sha;
      itemsData = JSON.parse(decodeBase64Utf8(data.content.replace(/\n/g, '')));
    }
    render();
  } catch(e) {
    list.innerHTML = `<div class="app-error">❌ ${e.message}<br><small>⚙️ 設定を確認してください</small></div>`;
  }
}

// ===== Date helper =====
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

// ===== Render dispatcher =====
function render() { _foodMode ? renderFoods() : renderItems(); }

// ========== 消耗品 render（既存ロジック） ==========
function renderItems() {
  const notifyDays = getSettings().notifyDays || 7;
  const now = new Date();
  const urgent=[], soon=[], ok=[], stockOnly=[], paused=[], outOfStock=[];

  itemsData.forEach(item => {
    const isCare = item.kind === 'selfcare';
    const isVehicle = item.kind === 'vehicle';
    if (_careMode) { if (!isCare) return; }        // 身だしなみ: selfcareのみ
    else if (_petMode) { if (!item.pet) return; }  // ペット: petのみ
    else if (_vehicleMode) { if (!isVehicle) return; } // 車両: vehicleのみ
    else { if (item.pet || isCare || isVehicle) return; } // 通常: pet/selfcare/vehicleを除外
    if (item.paused) { paused.push(item); return; }
    const hasStock = item.stockTotal != null && item.stockTotal > 0;
    const stockEmpty = hasStock && (item.stockCurrent === 0 || item.stockCurrent == null);
    if (stockEmpty) outOfStock.push(item);
    if (!item.cycleDays) { stockOnly.push(item); return; }
    const last = new Date(item.lastReplaced);
    const elapsed = Math.floor((now - last) / 86400000);
    const remaining = item.cycleDays - elapsed;
    item._remaining = remaining;
    item._progress = Math.max(remaining / item.cycleDays, 0);
    if (remaining <= 0) urgent.push(item);
    else if (remaining <= notifyDays) soon.push(item);
    else ok.push(item);
  });

  document.getElementById('sumUrgent').textContent = urgent.length;
  document.getElementById('sumSoon').textContent = soon.length;
  document.getElementById('sumOk').textContent = ok.length;

  let html = '';
  if (urgent.length) { html += sec('🔔 今すぐ対応', urgent.map(i=>cardCycle(i,'urgent')).join('')); }
  if (outOfStock.length) { html += sec('📦 在庫切れ', outOfStock.map(cardOutOfStock).join('')); }
  if (soon.length) { html += sec('⚠️ まもなく交換', soon.map(i=>cardCycle(i,'soon')).join('')); }
  if (ok.length) { html += sec('✅ 正常', ok.map(i=>cardCycle(i,'ok')).join('')); }
  if (stockOnly.length) { html += sec('📦 在庫管理', stockOnly.map(cardStockOnly).join('')); }
  if (paused.length) { html += sec('⏸ 一時停止中', paused.map(cardPaused).join('')); }
  if (!html) html = `<div class="loading">${_careMode ? '✂️ 身だしなみのアイテムはありません' : (_petMode ? '🐰 ペット関連のアイテムはありません' : 'アイテムがありません')}</div>`;
  document.getElementById('itemList').innerHTML = html;
}

// ========== 食品 render（賞味期限ベース） ==========
function renderFoods() {
  const expired=[], outstock=[], soon=[], ok=[], paused=[];
  foodsData.forEach(f => {
    if (f.paused) { paused.push(f); return; }
    const dLeft = daysUntil(f.expiryDate);
    f._daysLeft = dLeft;
    // 在庫0(在庫管理してる品)は期限より優先で「要対応=買って」。持ってない物の期限は無意味
    if (f.stockTotal != null && (f.stockCurrent ?? 0) === 0) { outstock.push(f); return; }
    const threshold = (typeof f.notifyDaysBefore === 'number')
      ? f.notifyDaysBefore : (CATEGORY_DEFAULT_NOTIFY[f.category] || 3);
    if (dLeft == null) { ok.push(f); return; }
    if (dLeft < 0) expired.push(f);
    else if (dLeft <= threshold) soon.push(f);
    else ok.push(f);
  });
  expired.sort((a,b)=>a._daysLeft-b._daysLeft);
  soon.sort((a,b)=>a._daysLeft-b._daysLeft);
  ok.sort((a,b)=>(a._daysLeft??9999)-(b._daysLeft??9999));

  // 赤タイル=期限切れ＋在庫切れ(=要対応)
  document.getElementById('sumUrgent').textContent = expired.length + outstock.length;
  document.getElementById('sumSoon').textContent = soon.length;
  document.getElementById('sumOk').textContent = ok.length;

  let html = '';
  if (expired.length)  html += sec('⚠️ 期限切れ', expired.map(f=>cardFood(f,'urgent')).join(''));
  if (outstock.length) html += sec('🛒 在庫切れ・買って', outstock.map(f=>cardFood(f,'urgent')).join(''));
  if (soon.length)     html += sec('🔔 早めに消費', soon.map(f=>cardFood(f,'soon')).join(''));
  if (ok.length)       html += sec('✅ 余裕あり', ok.map(f=>cardFood(f,'ok')).join(''));
  if (paused.length)   html += sec('⏸ 一時停止中', paused.map(f=>cardFood(f,'ok')).join(''));
  if (!html) html = '<div class="loading">🥗 食品が登録されていません（➕ で追加）</div>';
  document.getElementById('itemList').innerHTML = html;
}

// ===== helpers =====
function sec(title, inner) { return `<div class="section"><div class="section-title">${title}</div>${inner}</div>`; }
// 総個数(cur)・満タン(total)・入数(units)から表示ラベル。units未設定/1は従来「x/y個」
function formatStock(cur, total, units) {
  cur = cur ?? 0;
  if (!units || units <= 1) return `${cur}/${total}個`;
  const boxes = Math.floor(cur / units), rem = cur % units;
  if (boxes === 0) return `${rem}個`;
  const head = rem === 0 ? `${boxes}箱` : `${boxes}箱＋${rem}個`;
  return `${head}（計${cur}個）`;
}
function stockBadgeHtml(item) {
  if (item.stockTotal == null || item.stockTotal <= 0) return '';
  const cur = item.stockCurrent ?? 0, total = item.stockTotal;
  const u = item.unitsPerPack;
  let cls='', label=formatStock(cur, total, u);
  if (cur === 0) { cls='danger'; label=`在庫切れ 0/${total}個`; }
  else if (u>1 ? cur<u : cur<=1) { cls='warning'; label=`残り${formatStock(cur,total,u)}`; }
  return `<span class="stock-badge ${cls}">${label}</span>`;
}

// ===== 消耗品カード（既存） =====
function cardCycle(item, level) {
  const remaining = item._remaining;
  const pctWidth = Math.round(item._progress * 100);
  const statusText = remaining <= 0 ? `${Math.abs(remaining)}日超過` : `残り${remaining}日`;
  return `<div class="card ${level}">
    <div class="card-top"><span class="item-icon">${item.icon||'📦'}</span>
    <span class="item-name">${item.name}${stockBadgeHtml(item)}</span>
    <span class="status-badge ${level}">${statusText}</span></div>
    <div class="progress-wrap"><div class="progress-bar ${level}" style="width:${pctWidth}%"></div></div>
    <div class="meta">${item.note||''} · ${item.cycleDays}日サイクル</div>
    <div class="card-actions">
      ${item.asin?`<button class="btn amazon" onclick="openAmazon('${item.asin}')">🛒 Amazonで購入</button>`:''}
      <button class="btn replace" onclick="markReplaced('${item.id}')">✅ 交換済み</button>
      <button class="btn edit" onclick="editItem('${item.id}')">✏️</button>
    </div></div>`;
}
function cardOutOfStock(item) {
  return `<div class="card out-of-stock"><div class="card-top">
    <span class="item-icon">${item.icon||'📦'}</span><span class="item-name">${item.name}</span>
    <span class="stock-badge danger">📦 在庫切れ 0/${item.stockTotal}個</span></div>
    <div class="card-actions">
    ${item.asin?`<button class="btn amazon" onclick="openAmazon('${item.asin}')">🛒 Amazonで購入</button>`:''}
    <button class="btn edit" onclick="editItem('${item.id}')">✏️ 在庫を補充</button></div></div>`;
}
function cardStockOnly(item) {
  const cur = item.stockCurrent ?? 0, total = item.stockTotal ?? 0;
  const u = item.unitsPerPack;
  let numClass = cur===0?'danger':((u>1 ? cur<u : cur<=1)?'warning':'ok');
  return `<div class="card stock-only"><div class="card-top">
    <span class="item-icon">${item.icon||'📦'}</span><span class="item-name">${item.name}</span></div>
    <div class="stock-large ${numClass}">${formatStock(cur, total, u)}</div><div class="meta">${item.note||''}</div>
    <div class="card-actions">
    ${item.asin?`<button class="btn amazon" onclick="openAmazon('${item.asin}')">🛒 Amazonで購入</button>`:''}
    ${u>1?`<button class="btn amazon" onclick="buyPack('${item.id}')">🛒 買った(+1箱)</button>`:''}
    <button class="btn replace" onclick="useStock('${item.id}')">✅ 使用済み(-1)</button>
    <button class="btn edit" onclick="editItem('${item.id}')">✏️</button></div></div>`;
}
function cardPaused(item) {
  return `<div class="card paused"><div class="card-top">
    <span class="item-icon">${item.icon||'📦'}</span>
    <span class="item-name">${item.name} <span class="stock-badge">⏸ 停止中</span></span></div>
    <div class="meta">${item.note||''}</div>
    <div class="card-actions"><button class="btn edit" onclick="editItem('${item.id}')">✏️ 編集・再開</button></div></div>`;
}

// ===== 食品カード =====
function cardFood(f, level) {
  const d = f._daysLeft;
  let statusText;
  const outOfStock = f.stockTotal != null && (f.stockCurrent ?? 0) === 0;
  if (outOfStock) statusText = '在庫なし';
  else if (d == null) statusText = '期限未設定';
  else if (d < 0) statusText = `${Math.abs(d)}日超過`;
  else if (d === 0) statusText = '今日まで';
  else statusText = `あと${d}日`;
  const ing = f.isIngredient ? `<span class="stock-badge ingredient">🍳食材</span>` : '';
  return `<div class="card ${level}">
    <div class="card-top"><span class="item-icon">${f.icon||'🍽'}</span>
    <span class="item-name">${f.name}${ing}${stockBadgeHtml(f)}</span>
    <span class="status-badge ${level}">${statusText}</span></div>
    <div class="meta">${f.category||''}${f.expiryDate?` · 期限 ${f.expiryDate}`:''}${f.note?` · ${f.note}`:''}</div>
    <div class="card-actions">
      <button class="btn amazon" onclick="buyFood('${f.id}')">🛒 買った</button>
      <button class="btn replace" onclick="consumeFood('${f.id}')">✅ 食べた/使った</button>
      <button class="btn edit" onclick="editItem('${f.id}')">✏️</button>
    </div></div>`;
}

// ===== ID採番（有意数値ID: 台帳コード*100000+連番。items=200 / foods=210）=====
// 旧タイムスタンプidと新数値idが混在しても、該当コードブロックの最大連番+1を返す。
function nextNumericId(arr, code) {
  const base = code * 100000;
  let maxSeq = 0;
  for (const it of arr) {
    const n = Number(it && it.id);
    if (Number.isInteger(n) && n > base && n <= base + 99999) {
      const seq = n - base;
      if (seq > maxSeq) maxSeq = seq;
    }
  }
  return base + maxSeq + 1;
}

// ===== Actions =====
function openAmazon(asin) { window.open(`https://www.amazon.co.jp/dp/${asin}/?tag=autostock-22`, '_blank'); }

async function markReplaced(id) {
  if (!confirm('交換済みにしますか？')) return;
  const item = itemsData.find(i=>String(i.id)===String(id)); if(!item) return;
  item.lastReplaced = new Date().toISOString().slice(0,10);
  if (item.stockTotal!=null && item.stockCurrent!=null && item.stockCurrent>0) item.stockCurrent--;
  try { await saveItems(); render(); } catch(e){ alert('保存エラー: '+e.message); }
}
async function useStock(id) {
  const item = itemsData.find(i=>String(i.id)===String(id)); if(!item) return;
  if ((item.stockCurrent??0)<=0){ alert('在庫が0です'); return; }
  item.stockCurrent--;
  try { await saveItems(); render(); } catch(e){ alert('保存エラー: '+e.message); }
}
// パック品を1箱買い足し: 総個数を+入数、満タンは現残に追従
async function buyPack(id) {
  const item = itemsData.find(i=>String(i.id)===String(id)); if(!item) return;
  const u = item.unitsPerPack||1;
  item.stockCurrent = (item.stockCurrent??0) + u;
  item.stockTotal = Math.max(item.stockTotal??0, item.stockCurrent);
  try { await saveItems(); render(); } catch(e){ alert('保存エラー: '+e.message); }
}
// 買った/補充: 購入日を今日にリセット→賞味期間があれば期限を今日+賞味期間で再計算。在庫は満タンに補充
async function buyFood(id) {
  const f = foodsData.find(x=>String(x.id)===String(id)); if(!f) return;
  f.purchaseDate = todayStr();
  if (f.shelfLifeDays != null) f.expiryDate = addDaysStr(f.purchaseDate, f.shelfLifeDays);
  if (f.stockTotal != null) {
    if (f.unitsPerPack > 1) { f.stockCurrent = (f.stockCurrent??0) + f.unitsPerPack; f.stockTotal = Math.max(f.stockTotal, f.stockCurrent); } // パック=+1箱
    else f.stockCurrent = f.stockTotal; // 買い直し=満タンに
  }
  try { await saveFoods(); render(); } catch(e){ alert('保存エラー: '+e.message); }
}
// 食品を消費: 残数を減らし、0になったら（食材なら）買い足しは同期GAS側が拾う。0在庫の食材はここで注意喚起
async function consumeFood(id) {
  const f = foodsData.find(x=>String(x.id)===String(id)); if(!f) return;
  if (f.stockTotal!=null && f.stockCurrent!=null && f.stockCurrent>0) {
    f.stockCurrent--;
  } else {
    if (!confirm('この食品を消費（リストから削除）しますか？')) return;
    foodsData = foodsData.filter(x=>String(x.id)!==String(id));
  }
  try {
    await saveFoods(); render();
    if (f.isIngredient && (f.stockCurrent===0 || !foodsData.find(x=>String(x.id)===String(id)))) {
      alert('🛒 料理食材の使い切りとして、次回同期で買い足しリストに追加されます');
    }
  } catch(e){ alert('保存エラー: '+e.message); }
}

async function saveItem() {
  const id = document.getElementById('editId').value;
  const icon = document.getElementById('editIcon').value.trim();
  const name = document.getElementById('editName').value.trim();
  const stockTotalVal = document.getElementById('editStockTotal').value.trim();
  const stockTotal = stockTotalVal ? parseInt(stockTotalVal) : null;
  const stockCurrentVal = document.getElementById('editStockCurrent').value.trim();
  const stockCurrent = stockCurrentVal ? parseInt(stockCurrentVal) : null;
  const upVal = document.getElementById('editUnitsPerPack').value.trim();
  const unitsPerPack = (upVal && parseInt(upVal) > 1) ? parseInt(upVal) : null;
  const note = document.getElementById('editNote').value.trim();
  const paused = document.getElementById('editPaused').checked;
  const err = document.getElementById('editError');
  if (!name) { err.textContent='名前を入力してください'; err.style.display='block'; return; }

  if (_foodMode) {
    const category = document.getElementById('editCategory').value;
    const ndVal = document.getElementById('editNotifyDays').value.trim();
    const notifyDaysBefore = ndVal ? parseInt(ndVal) : (CATEGORY_DEFAULT_NOTIFY[category] || 3);
    const isIngredient = document.getElementById('editIngredient').checked;
    const shelfLifeDays = readShelfDays();
    const purchaseDate = document.getElementById('editPurchase').value || todayStr();
    // 賞味期間があれば「購入日＋賞味期間」で期限を自動計算。無ければ絶対日付を使う
    const expiryDate = (shelfLifeDays != null)
      ? addDaysStr(purchaseDate, shelfLifeDays)
      : document.getElementById('editExpiry').value;
    if (shelfLifeDays == null && !expiryDate) {
      err.textContent='賞味期間（買った日から何日/週/年）か、賞味期限のどちらかを入力してください';
      err.style.display='block'; return;
    }
    const data = { icon, name, category, shelfLifeDays, purchaseDate, expiryDate, notifyDaysBefore, isIngredient, restockRef:'', asin:'', stockTotal, stockCurrent, note, paused };
    if (unitsPerPack) data.unitsPerPack = unitsPerPack;
    if (id) {
      const idx = foodsData.findIndex(i=>String(i.id)===String(id));
      if (idx>=0) { foodsData[idx] = { ...foodsData[idx], ...data }; if (!unitsPerPack) delete foodsData[idx].unitsPerPack; }
    } else {
      foodsData.push({ id:nextNumericId(foodsData,210), enabled:true, addedDate:todayStr(), taskId:'', ...data });
    }
    try { await saveFoods(); closeModal(); render(); } catch(e){ alert('保存エラー: '+e.message); }
  } else {
    const asin = document.getElementById('editAsin').value.trim();
    const cycleVal = document.getElementById('editCycle').value.trim();
    const cycleDays = cycleVal ? parseInt(cycleVal) : null;
    const lastReplaced = document.getElementById('editLastReplaced').value;
    const pet = document.getElementById('editPet').checked;
    const care = document.getElementById('editCare').checked;
    const itemNdVal = document.getElementById('editItemNotifyDays').value.trim();
    if (!cycleDays && !stockTotal) { err.textContent='交換サイクルまたは在庫総数のどちらかは入力してください。'; err.style.display='block'; return; }
    const data = { icon, name, asin, cycleDays, lastReplaced, stockTotal, stockCurrent, note, paused, pet, kind: care ? 'selfcare' : '' };
    if (itemNdVal !== '') data.notifyDaysBefore = parseInt(itemNdVal);
    if (unitsPerPack) data.unitsPerPack = unitsPerPack;
    if (id) {
      const idx = itemsData.findIndex(i=>String(i.id)===String(id));
      if (idx>=0) { itemsData[idx] = { ...itemsData[idx], ...data }; if (itemNdVal === '') delete itemsData[idx].notifyDaysBefore; if (!unitsPerPack) delete itemsData[idx].unitsPerPack; }
    } else {
      itemsData.push({ id:nextNumericId(itemsData,200), enabled:true, ...data });
    }
    try { await saveItems(); closeModal(); render(); } catch(e){ alert('保存エラー: '+e.message); }
  }
}
async function deleteItem() {
  const id = document.getElementById('editId').value; if(!id) return;
  if (!confirm('本当に削除しますか？')) return;
  if (_foodMode) { foodsData = foodsData.filter(i=>String(i.id)!==String(id)); try{ await saveFoods(); }catch(e){ alert('削除エラー: '+e.message); return;} }
  else { itemsData = itemsData.filter(i=>String(i.id)!==String(id)); try{ await saveItems(); }catch(e){ alert('削除エラー: '+e.message); return;} }
  closeModal(); render();
}
function closeModal() { document.getElementById('editModal').classList.remove('show'); }

// ===== Init =====
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const setup = params.get('setup');
  if (setup) {
    const parts = setup.split(':');
    if (parts.length >= 3) {
      localStorage.setItem('autostock_settings', JSON.stringify({ user:parts[0], repo:parts[1], token:parts.slice(2).join(':'), notifyDays:7 }));
      history.replaceState(null, '', location.pathname);
    }
  }
  document.querySelectorAll('.food-only').forEach(el => el.style.display='none');
  const s = getSettings();
  if (s.user && s.repo && s.token) loadData();
});
</script>
