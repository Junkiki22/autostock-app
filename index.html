<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AutoStock – 消耗品自動管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans JP',sans-serif;
  background:#0a0a1a;
  color:#e0e0e0;
  min-height:100vh;
  transition: background 0.3s, color 0.3s;
}
/* ===== Pet Mode Theme (明るいグレー) ===== */
body.pet-mode { background:#d8d8e0; color:#333350; }
body.pet-mode .header { background:linear-gradient(135deg,#8888a0,#9999b0); }
body.pet-mode .summary-bar { background:rgba(120,120,150,0.15); }
body.pet-mode .summary-item { background:rgba(120,120,150,0.15); color:#555570; }
body.pet-mode .card { background:#e8e8f0; border-left-color:#7070a0; }
body.pet-mode .card .item-name { color:#333350; }
body.pet-mode .card .meta { color:#666680; }
body.pet-mode .section-title { color:#555570; }
body.pet-mode .btn { background:#7070a0; }
body.pet-mode .btn:hover { background:#606090; }
body.pet-mode .modal-content { background:#e0e0e8; color:#333350; }
body.pet-mode .modal-content input,
body.pet-mode .modal-content select { background:#f0f0f5; color:#333350; border-color:#aaaacc; }
body.pet-mode .stock-badge { background:rgba(100,100,140,0.15); color:#555570; }

.header {
  background:linear-gradient(135deg,#1a1a3e,#2d1b69);
  padding:16px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.header h1 { font-size:20px; font-weight:700; }
.header-btns { display:flex; gap:8px; }
.header-btn {
  background:rgba(255,255,255,0.15);
  border:none; border-radius:50%;
  width:36px; height:36px;
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#fff; transition:background 0.2s;
}
.header-btn:hover { background:rgba(255,255,255,0.25); }
.header-btn.active { background:rgba(255,255,255,0.35); box-shadow:0 0 8px rgba(255,255,255,0.3); }
body.pet-mode .header-btn { color:#fff; }

.container { max-width:480px; margin:0 auto; padding:12px; }

/* Summary bar */
.summary-bar {
  display:flex; gap:8px; margin-bottom:16px;
  background:rgba(255,255,255,0.05);
  border-radius:12px; padding:10px;
}
.summary-item {
  flex:1; text-align:center; border-radius:8px;
  padding:8px 4px; background:rgba(255,255,255,0.05);
  font-size:12px; color:#888;
}
.summary-item .num { font-size:22px; font-weight:700; display:block; }
.summary-item.urgent .num { color:#ff4757; }
.summary-item.soon .num { color:#ffa502; }
.summary-item.ok .num { color:#2ed573; }

/* Sections */
.section { margin-bottom:16px; }
.section-title {
  font-size:13px; font-weight:500; color:#888;
  margin-bottom:8px; padding-left:4px;
}

/* Cards */
.card {
  background:#151530;
  border-radius:12px;
  padding:14px;
  margin-bottom:8px;
  border-left:4px solid #2ed573;
  position:relative;
  transition: opacity 0.3s, background 0.3s;
}
.card.urgent { border-left-color:#ff4757; }
.card.soon { border-left-color:#ffa502; }
.card.ok { border-left-color:#2ed573; }
.card.stock-only { border-left-color:#5352ed; }
.card.out-of-stock { border-left-color:#ff4757; background:#1a0a0a; }
body.pet-mode .card.out-of-stock { background:#f0e0e0; }
.card.paused { opacity:0.5; border-left-color:#666; }

.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.item-icon { font-size:24px; margin-right:8px; }
.item-name { font-size:15px; font-weight:500; flex:1; }
.meta { font-size:11px; color:#888; }

/* Stock badge */
.stock-badge {
  display:inline-block;
  font-size:11px;
  padding:2px 8px;
  border-radius:10px;
  margin-left:8px;
  background:rgba(255,255,255,0.08);
}
.stock-badge.warning { color:#ffa502; background:rgba(255,165,2,0.15); }
.stock-badge.danger { color:#ff4757; background:rgba(255,71,87,0.15); }

/* Progress bar */
.progress-wrap {
  height:6px; background:rgba(255,255,255,0.1);
  border-radius:3px; margin:8px 0; overflow:hidden;
}
.progress-bar {
  height:100%; border-radius:3px;
  transition:width 0.5s;
}
.progress-bar.ok { background:#2ed573; }
.progress-bar.soon { background:#ffa502; }
.progress-bar.urgent { background:#ff4757; }

/* Status badge */
.status-badge {
  display:inline-block; font-size:11px; padding:2px 8px;
  border-radius:10px; font-weight:500;
}
.status-badge.urgent { background:rgba(255,71,87,0.2); color:#ff4757; }
.status-badge.soon { background:rgba(255,165,2,0.2); color:#ffa502; }
.status-badge.ok { background:rgba(46,213,115,0.2); color:#2ed573; }

/* Buttons */
.card-actions { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.btn {
  border:none; border-radius:8px; padding:7px 12px;
  font-size:12px; cursor:pointer; font-family:inherit;
  background:#5352ed; color:#fff; transition:background 0.2s;
}
.btn:hover { background:#4341d0; }
.btn.amazon { background:#ff9900; color:#000; }
.btn.amazon:hover { background:#e68a00; }
.btn.replace { background:#2ed573; color:#000; }
.btn.replace:hover { background:#26b85f; }
.btn.edit { background:rgba(255,255,255,0.1); color:#ccc; }
.btn.edit:hover { background:rgba(255,255,255,0.2); }
body.pet-mode .btn.edit { background:rgba(0,0,0,0.08); color:#555; }

/* Stock only card large number */
.stock-large {
  font-size:28px; font-weight:700; text-align:center;
  padding:8px 0;
}
.stock-large.warning { color:#ffa502; }
.stock-large.danger { color:#ff4757; }
.stock-large.ok { color:#2ed573; }

/* Modal */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,0.7); z-index:200;
  align-items:center; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal-content {
  background:#1a1a3e; border-radius:16px; padding:24px;
  width:90%; max-width:400px; max-height:85vh; overflow-y:auto;
  color:#e0e0e0;
}
.modal-content h2 { font-size:18px; margin-bottom:16px; }
.modal-content label { display:block; font-size:13px; color:#aaa; margin:10px 0 4px; }
.modal-content input, .modal-content select {
  width:100%; padding:10px; border-radius:8px;
  border:1px solid #333; background:#0d0d20; color:#e0e0e0;
  font-size:14px; font-family:inherit;
}
.modal-content .checkbox-row {
  display:flex; align-items:center; gap:8px;
  margin:12px 0; font-size:14px;
}
.modal-content .checkbox-row input[type=checkbox] {
  width:18px; height:18px;
}
.modal-btns { display:flex; gap:8px; margin-top:20px; }
.modal-btns .btn { flex:1; padding:12px; font-size:14px; }
.btn.cancel { background:#555; }
.btn.cancel:hover { background:#666; }
.btn.danger { background:#ff4757; }
.btn.danger:hover { background:#e03e4d; }
.error-msg { color:#ff4757; font-size:12px; margin-top:4px; display:none; }

/* Settings modal */
.settings-group { margin-bottom:12px; }
.settings-group label { font-size:12px; color:#999; }

/* Loading / Error */
.loading { text-align:center; padding:40px; color:#888; font-size:14px; }
.app-error { text-align:center; padding:40px; color:#ff4757; font-size:14px; }
</style>
</head>
<body>

<div class="header">
  <h1>📦 AutoStock</h1>
  <div class="header-btns">
    <button class="header-btn" onclick="togglePetMode()" title="ペットモード" id="petBtn">🐰</button>
    <button class="header-btn" onclick="loadItems()" title="更新">🔄</button>
    <button class="header-btn" onclick="openSettings()" title="設定">⚙️</button>
    <button class="header-btn" onclick="openAdd()" title="追加">➕</button>
  </div>
</div>

<div class="container">
  <div class="summary-bar">
    <div class="summary-item urgent"><span class="num" id="sumUrgent">0</span>要交換</div>
    <div class="summary-item soon"><span class="num" id="sumSoon">0</span>まもなく</div>
    <div class="summary-item ok"><span class="num" id="sumOk">0</span>正常</div>
  </div>
  <div id="itemList"><div class="loading">⚙️ 設定からGitHub接続してください</div></div>
</div>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-content">
    <h2 id="modalTitle">アイテム編集</h2>
    <input type="hidden" id="editId">
    <label>アイコン（絵文字）</label>
    <input type="text" id="editIcon" placeholder="💧">
    <label>名前</label>
    <input type="text" id="editName" placeholder="浄水器フィルター">
    <label>Amazon ASIN</label>
    <input type="text" id="editAsin" placeholder="B07ZDBXX47">
    <label>交換サイクル（日）※在庫のみ管理の場合は空欄</label>
    <input type="number" id="editCycle" placeholder="60">
    <label>最終交換日</label>
    <input type="date" id="editLastReplaced">
    <label>在庫総数（任意）</label>
    <input type="number" id="editStockTotal" placeholder="3" min="0">
    <label>現在の残数（任意）</label>
    <input type="number" id="editStockCurrent" placeholder="2" min="0">
    <label>メモ</label>
    <input type="text" id="editNote" placeholder="2ヶ月に1回">
    <div class="checkbox-row">
      <input type="checkbox" id="editPaused">
      <span>⏸ 一時停止する</span>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="editPet">
      <span>🐰 ペット関連のアイテム</span>
    </div>
    <div class="error-msg" id="editError">交換サイクルまたは在庫総数のどちらかは入力してください。</div>
    <div class="modal-btns">
      <button class="btn cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn danger" id="deleteBtn" onclick="deleteItem()" style="display:none">🗑</button>
      <button class="btn" onclick="saveItem()">保存する</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <h2>⚙️ GitHub 設定</h2>
    <div class="settings-group">
      <label>GitHubユーザー名</label>
      <input type="text" id="setUser" placeholder="Junkiki22">
    </div>
    <div class="settings-group">
      <label>リポジトリ名</label>
      <input type="text" id="setRepo" placeholder="autostock">
    </div>
    <div class="settings-group">
      <label>Personal Access Token</label>
      <input type="password" id="setToken" placeholder="ghp_xxxxxxxxxx">
    </div>
    <div class="settings-group">
      <label>通知タイミング（何日前）</label>
      <input type="number" id="setNotifyDays" placeholder="7" value="7">
    </div>
    <div class="modal-btns">
      <button class="btn cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn" onclick="saveSettings()">保存して読み込む</button>
    </div>
  </div>
</div>

<script>
// ===== State =====
let itemsData = [];
let _petMode = false;
let _fileSha = null;

// ===== Settings =====
function getSettings() {
  try {
    return JSON.parse(localStorage.getItem('autostock_settings') || '{}');
  } catch(e) { return {}; }
}
function openSettings() {
  const s = getSettings();
  document.getElementById('setUser').value = s.user || '';
  document.getElementById('setRepo').value = s.repo || '';
  document.getElementById('setToken').value = s.token || '';
  document.getElementById('setNotifyDays').value = s.notifyDays || 7;
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('show');
}
function saveSettings() {
  const settings = {
    user: document.getElementById('setUser').value.trim(),
    repo: document.getElementById('setRepo').value.trim(),
    token: document.getElementById('setToken').value.trim(),
    notifyDays: parseInt(document.getElementById('setNotifyDays').value) || 7
  };
  localStorage.setItem('autostock_settings', JSON.stringify(settings));
  closeSettings();
  loadItems();
}

// ===== Pet Mode =====
function togglePetMode() {
  _petMode = !_petMode;
  document.body.classList.toggle('pet-mode', _petMode);
  document.getElementById('petBtn').classList.toggle('active', _petMode);
  // Re-render with existing data, no reload
  if (itemsData && itemsData.length > 0) {
    render(itemsData);
  }
}

// ===== GitHub API =====
async function ghFetch(path, options = {}) {
  const s = getSettings();
  if (!s.user || !s.repo || !s.token) throw new Error('GitHub設定が未入力です');
  const url = `https://api.github.com/repos/${s.user}/${s.repo}/contents/${path}`;
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': `token ${s.token}`,
      'Accept': 'application/vnd.github.v3+json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) throw new Error(`GitHub API Error ${res.status}`);
  return res.json();
}

function decodeBase64Utf8(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function encodeUtf8Base64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

async function loadItems() {
  const list = document.getElementById('itemList');
  list.innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const data = await ghFetch('items.json');
    _fileSha = data.sha;
    const content = decodeBase64Utf8(data.content.replace(/\n/g, ''));
    itemsData = JSON.parse(content);
    render(itemsData);
  } catch(e) {
    list.innerHTML = `<div class="app-error">❌ ${e.message}<br><small>⚙️ 設定を確認してください</small></div>`;
  }
}

async function saveToGitHub(items) {
  const content = encodeUtf8Base64(JSON.stringify(items, null, 2));
  const res = await ghFetch('items.json', {
    method: 'PUT',
    body: JSON.stringify({
      message: 'Update items from AutoStock app',
      content: content,
      sha: _fileSha
    })
  });
  _fileSha = res.content.sha;
}

// ===== Render =====
function render(items) {
  const notifyDays = getSettings().notifyDays || 7;
  const now = new Date();

  // Classify items
  const urgent = [], soon = [], ok = [], stockOnly = [], paused = [], outOfStock = [];

  items.forEach(item => {
    // Pet mode filter
    if (_petMode && !item.pet) return;
    if (!_petMode && item.pet) return;

    // Paused items
    if (item.paused) { paused.push(item); return; }

    // Check if out of stock (for the separate section)
    const isOutOfStock = (item.stockTotal != null && item.stockTotal > 0 && (item.stockCurrent === 0 || item.stockCurrent == null && false));
    const hasStock = item.stockTotal != null && item.stockTotal > 0;
    const stockEmpty = hasStock && (item.stockCurrent === 0 || item.stockCurrent === undefined || item.stockCurrent === null);

    if (stockEmpty) outOfStock.push(item);

    // Stock-only items (no cycle)
    if (!item.cycleDays) {
      stockOnly.push(item);
      return;
    }

    // Cycle-based classification
    const last = new Date(item.lastReplaced);
    const elapsed = Math.floor((now - last) / 86400000);
    const remaining = item.cycleDays - elapsed;
    item._elapsed = elapsed;
    item._remaining = remaining;
    item._progress = Math.min(elapsed / item.cycleDays, 1);

    if (remaining <= 0) urgent.push(item);
    else if (remaining <= notifyDays) soon.push(item);
    else ok.push(item);
  });

  // Update summary (only cycle-based, non-paused, non-stock-only)
  document.getElementById('sumUrgent').textContent = urgent.length;
  document.getElementById('sumSoon').textContent = soon.length;
  document.getElementById('sumOk').textContent = ok.length;

  let html = '';

  // 1. Urgent section
  if (urgent.length) {
    html += `<div class="section"><div class="section-title">🔔 今すぐ対応</div>`;
    urgent.forEach(item => { html += cardCycle(item, 'urgent'); });
    html += `</div>`;
  }

  // 2. Out of stock section
  if (outOfStock.length) {
    html += `<div class="section"><div class="section-title">📦 在庫切れ</div>`;
    outOfStock.forEach(item => { html += cardOutOfStock(item); });
    html += `</div>`;
  }

  // 3. Soon section
  if (soon.length) {
    html += `<div class="section"><div class="section-title">⚠️ まもなく交換</div>`;
    soon.forEach(item => { html += cardCycle(item, 'soon'); });
    html += `</div>`;
  }

  // 4. OK section
  if (ok.length) {
    html += `<div class="section"><div class="section-title">✅ 正常</div>`;
    ok.forEach(item => { html += cardCycle(item, 'ok'); });
    html += `</div>`;
  }

  // 5. Stock-only section
  if (stockOnly.length) {
    html += `<div class="section"><div class="section-title">📦 在庫管理</div>`;
    stockOnly.forEach(item => { html += cardStockOnly(item); });
    html += `</div>`;
  }

  // 6. Paused section
  if (paused.length) {
    html += `<div class="section"><div class="section-title">⏸ 一時停止中</div>`;
    paused.forEach(item => { html += cardPaused(item); });
    html += `</div>`;
  }

  if (!html) {
    html = `<div class="loading">${_petMode ? '🐰 ペット関連のアイテムはありません' : 'アイテムがありません'}</div>`;
  }

  document.getElementById('itemList').innerHTML = html;
}

// ===== Card Renderers =====
function stockBadgeHtml(item) {
  if (item.stockTotal == null || item.stockTotal <= 0) return '';
  const cur = item.stockCurrent ?? 0;
  const total = item.stockTotal;
  let cls = '';
  let label = `${cur}/${total}個`;
  if (cur === 0) { cls = 'danger'; label = `在庫切れ 0/${total}個`; }
  else if (cur <= 1) { cls = 'warning'; label = `残り${cur}/${total}個`; }
  return `<span class="stock-badge ${cls}">${label}</span>`;
}

function cardCycle(item, level) {
  const remaining = item._remaining;
  const progress = item._progress;
  const pctWidth = Math.round(progress * 100);
  const statusText = remaining <= 0
    ? `${Math.abs(remaining)}日超過`
    : `残り${remaining}日`;

  return `
    <div class="card ${level}">
      <div class="card-top">
        <span class="item-icon">${item.icon || '📦'}</span>
        <span class="item-name">${item.name}${stockBadgeHtml(item)}</span>
        <span class="status-badge ${level}">${statusText}</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar ${level}" style="width:${pctWidth}%"></div>
      </div>
      <div class="meta">${item.note || ''} · ${item.cycleDays}日サイクル</div>
      <div class="card-actions">
        ${item.asin ? `<button class="btn amazon" onclick="openAmazon('${item.asin}')">🛒 Amazonで購入</button>` : ''}
        <button class="btn replace" onclick="markReplaced('${item.id}')">✅ 交換済み</button>
        <button class="btn edit" onclick="editItem('${item.id}')">✏️</button>
      </div>
    </div>`;
}

function cardOutOfStock(item) {
  return `
    <div class="card out-of-stock">
      <div class="card-top">
        <span class="item-icon">${item.icon || '📦'}</span>
        <span class="item-name">${item.name}</span>
        <span class="stock-badge danger">📦 在庫切れ 0/${item.stockTotal}個</span>
      </div>
      <div class="card-actions">
        ${item.asin ? `<button class="btn amazon" onclick="openAmazon('${item.asin}')">🛒 Amazonで購入</button>` : ''}
        <button class="btn edit" onclick="editItem('${item.id}')">✏️ 在庫を補充</button>
      </div>
    </div>`;
}

function cardStockOnly(item) {
  const cur = item.stockCurrent ?? 0;
  const total = item.stockTotal ?? 0;
  let numClass = 'ok';
  if (cur === 0) numClass = 'danger';
  else if (cur <= 1) numClass = 'warning';

  return `
    <div class="card stock-only">
      <div class="card-top">
        <span class="item-icon">${item.icon || '📦'}</span>
        <span class="item-name">${item.name}</span>
      </div>
      <div class="stock-large ${numClass}">${cur} / ${total}個</div>
      <div class="meta">${item.note || ''}</div>
      <div class="card-actions">
        ${item.asin ? `<button class="btn amazon" onclick="openAmazon('${item.asin}')">🛒 Amazonで購入</button>` : ''}
        <button class="btn replace" onclick="useStock('${item.id}')">✅ 使用済み(-1)</button>
        <button class="btn edit" onclick="editItem('${item.id}')">✏️</button>
      </div>
    </div>`;
}

function cardPaused(item) {
  return `
    <div class="card paused">
      <div class="card-top">
        <span class="item-icon">${item.icon || '📦'}</span>
        <span class="item-name">${item.name} <span class="stock-badge">⏸ 停止中</span></span>
      </div>
      <div class="meta">${item.note || ''}</div>
      <div class="card-actions">
        <button class="btn edit" onclick="editItem('${item.id}')">✏️ 編集・再開</button>
      </div>
    </div>`;
}

// ===== Actions =====
function openAmazon(asin) {
  window.open(`https://www.amazon.co.jp/dp/${asin}/?tag=autostock-22`, '_blank');
}

async function markReplaced(id) {
  if (!confirm('交換済みにしますか？')) return;
  const item = itemsData.find(i => i.id === id);
  if (!item) return;
  item.lastReplaced = new Date().toISOString().slice(0, 10);
  // Decrease stock if available
  if (item.stockTotal != null && item.stockCurrent != null && item.stockCurrent > 0) {
    item.stockCurrent--;
  }
  try {
    await saveToGitHub(itemsData);
    render(itemsData);
  } catch(e) { alert('保存エラー: ' + e.message); }
}

async function useStock(id) {
  const item = itemsData.find(i => i.id === id);
  if (!item) return;
  if ((item.stockCurrent ?? 0) <= 0) { alert('在庫が0です'); return; }
  item.stockCurrent--;
  try {
    await saveToGitHub(itemsData);
    render(itemsData);
  } catch(e) { alert('保存エラー: ' + e.message); }
}

// ===== Edit Modal =====
function openAdd() {
  document.getElementById('modalTitle').textContent = '➕ アイテム追加';
  document.getElementById('editId').value = '';
  document.getElementById('editIcon').value = '';
  document.getElementById('editName').value = '';
  document.getElementById('editAsin').value = '';
  document.getElementById('editCycle').value = '';
  document.getElementById('editLastReplaced').value = new Date().toISOString().slice(0, 10);
  document.getElementById('editStockTotal').value = '';
  document.getElementById('editStockCurrent').value = '';
  document.getElementById('editNote').value = '';
  document.getElementById('editPaused').checked = false;
  document.getElementById('editPet').checked = false;
  document.getElementById('editError').style.display = 'none';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('editModal').classList.add('show');
}

function editItem(id) {
  const item = itemsData.find(i => i.id === id);
  if (!item) return;
  document.getElementById('modalTitle').textContent = '✏️ アイテム編集';
  document.getElementById('editId').value = item.id;
  document.getElementById('editIcon').value = item.icon || '';
  document.getElementById('editName').value = item.name || '';
  document.getElementById('editAsin').value = item.asin || '';
  document.getElementById('editCycle').value = item.cycleDays || '';
  document.getElementById('editLastReplaced').value = item.lastReplaced || '';
  document.getElementById('editStockTotal').value = item.stockTotal ?? '';
  document.getElementById('editStockCurrent').value = item.stockCurrent ?? '';
  document.getElementById('editNote').value = item.note || '';
  document.getElementById('editPaused').checked = !!item.paused;
  document.getElementById('editPet').checked = !!item.pet;
  document.getElementById('editError').style.display = 'none';
  document.getElementById('deleteBtn').style.display = 'inline-block';
  document.getElementById('editModal').classList.add('show');
}

async function saveItem() {
  const id = document.getElementById('editId').value;
  const icon = document.getElementById('editIcon').value.trim();
  const name = document.getElementById('editName').value.trim();
  const asin = document.getElementById('editAsin').value.trim();
  const cycleVal = document.getElementById('editCycle').value.trim();
  const cycleDays = cycleVal ? parseInt(cycleVal) : null;
  const lastReplaced = document.getElementById('editLastReplaced').value;
  const stockTotalVal = document.getElementById('editStockTotal').value.trim();
  const stockTotal = stockTotalVal ? parseInt(stockTotalVal) : null;
  const stockCurrentVal = document.getElementById('editStockCurrent').value.trim();
  const stockCurrent = stockCurrentVal ? parseInt(stockCurrentVal) : null;
  const note = document.getElementById('editNote').value.trim();
  const paused = document.getElementById('editPaused').checked;
  const pet = document.getElementById('editPet').checked;

  // Validation: at least one of cycleDays or stockTotal must be set
  if (!cycleDays && !stockTotal) {
    document.getElementById('editError').style.display = 'block';
    return;
  }
  if (!name) { alert('名前を入力してください'); return; }

  const itemData = { icon, name, asin, cycleDays, lastReplaced, stockTotal, stockCurrent, note, paused, pet };

  if (id) {
    // Update existing
    const idx = itemsData.findIndex(i => i.id === id);
    if (idx >= 0) {
      itemsData[idx] = { ...itemsData[idx], ...itemData };
    }
  } else {
    // Add new
    const newId = String(Date.now());
    itemsData.push({ id: newId, enabled: true, ...itemData });
  }

  try {
    await saveToGitHub(itemsData);
    closeModal();
    render(itemsData);
  } catch(e) { alert('保存エラー: ' + e.message); }
}

async function deleteItem() {
  const id = document.getElementById('editId').value;
  if (!id) return;
  if (!confirm('本当に削除しますか？')) return;
  itemsData = itemsData.filter(i => i.id !== id);
  try {
    await saveToGitHub(itemsData);
    closeModal();
    render(itemsData);
  } catch(e) { alert('削除エラー: ' + e.message); }
}

function closeModal() {
  document.getElementById('editModal').classList.remove('show');
}

// ===== Init =====
window.addEventListener('DOMContentLoaded', () => {
  const s = getSettings();
  if (s.user && s.repo && s.token) loadItems();
});
</script>
